<!DOCTYPE html>
<html lang="en" class="bg-white dark:bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora Admin Dashboard</title>
    <link rel="icon" href="/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="min-h-screen bg-gradient-to-r from-black via-blue-900 to-gold-900 dark:from-black text-white">
    <header class="flex items-center justify-between px-7 py-5 glass mb-6 w-full fixed z-40">
        <div class="flex items-center gap-2">
            <img src="/assets/img/logo.png" alt="Logo" class="h-8 rounded-full" />
            <span class="font-bold text-xl text-gold-400">Vendora Admin</span>
        </div>
        <button onclick="handleLogout()" class="bg-red-600 text-white rounded px-4 py-1 font-bold">Logout</button>
    </header>
    <div class="h-20"></div>
    <main class="max-w-6xl mx-auto py-8 px-3">
        <h1 class="text-2xl md:text-4xl font-bold text-gold-400 mb-3">Dashboard Overview</h1>
        <div class="grid md:grid-cols-4 gap-6 mb-10">
            <!-- Could fetch live stats here for admin -->
            <div class="glass p-4 rounded shadow">
                <div class="text-xs text-gray-400">Users</div>
                <div class="font-bold text-2xl" id="stat-users">-</div>
            </div>
            <div class="glass p-4 rounded shadow">
                <div class="text-xs text-gray-400">Wallet Balance</div>
                <div class="font-bold text-2xl" id="stat-total-wallet">-</div>
            </div>
            <div class="glass p-4 rounded shadow">
                <div class="text-xs text-gray-400">Products</div>
                <div class="font-bold text-2xl" id="stat-products">-</div>
            </div>
            <div class="glass p-4 rounded shadow">
                <div class="text-xs text-gray-400">Active Orders</div>
                <div class="font-bold text-2xl" id="stat-orders">-</div>
            </div>
        </div>
        <h2 class="font-bold text-xl mb-4">Manage Products</h2>
        <form id="productForm" class="flex flex-wrap gap-3 mb-4 bg-black/20 p-4 rounded" onsubmit="createProduct(event)">
            <input name="title" required placeholder="Title" class="p-2 rounded bg-slate-50 dark:bg-black border w-32" />
            <input name="category" placeholder="Category" class="p-2 rounded bg-slate-50 dark:bg-black border w-32" />
            <input name="price" type="number" required placeholder="Price" class="p-2 rounded bg-slate-50 dark:bg-black border w-24" />
            <input name="image_url" placeholder="Image URL" class="p-2 rounded bg-slate-50 dark:bg-black border w-48" />
            <button class="bg-gradient-to-r from-blue-400 to-gold-400 neon-btn px-4 py-2 rounded-full font-bold text-black">Add Product</button>
        </form>
        <div>
            <table class="w-full text-sm bg-black/20 rounded">
                <thead>
                    <tr class="text-gold-300">
                        <th>Title</th><th>Category</th><th>Price</th><th>Featured</th><th></th>
                    </tr>
                </thead>
                <tbody id="product-table-body"></tbody>
            </table>
        </div>
        <!-- More admin sections: Ads, Landing page edits, support, orders, etc. can be added here -->
    </main>
    <script src="/assets/js/supabase.js"></script>
    <script src="/assets/js/dashboard.js"></script>
    <script>
        // Minimal: fetch products/user counts, populate forms, etc
        window.addEventListener('DOMContentLoaded', async () => {
            // Fetch stats
            const { supabase } = window.VendoraSupabase || {};
            if (!supabase) return;
            const { data: users } = await supabase.from('users').select('id');
            document.getElementById('stat-users').textContent = users?.length||'0';
            const { data: wallets } = await supabase.from('wallets').select('balance');
            let sum = 0; (wallets||[]).forEach(w=>sum+=(Number(w.balance)||0));
            document.getElementById('stat-total-wallet').textContent = '₦' + sum.toLocaleString();
            const { data: products } = await supabase.from('products').select('id');
            document.getElementById('stat-products').textContent = products?.length||'0';
            const { data: orders } = await supabase.from('orders').select('id');
            document.getElementById('stat-orders').textContent = orders?.length||'0';
            // Fetch products
            const { data: prodList } = await supabase.from('products').select('*');
            document.getElementById('product-table-body').innerHTML =
                (prodList||[]).map(p => `
                    <tr>
                        <td>${p.title}</td>
                        <td>${p.category}</td>
                        <td>₦${p.price}</td>
                        <td>${p.is_featured?'✅':'❌'}</td>
                        <td>
                            <button onclick="deleteProduct('${p.id}')" class="bg-red-600 text-white px-2 py-1 rounded">Delete</button>
                        </td>
                    </tr>
                `).join('');
        });
    </script>
</body>
</html>
