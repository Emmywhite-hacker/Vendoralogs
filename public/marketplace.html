<!DOCTYPE html>
<html lang="en" class="bg-white dark:bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora Marketplace</title>
    <link rel="icon" href="favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="min-h-screen bg-gradient-to-tr from-black via-[#161f2b] to-gold-800 dark:from-black dark:to-[#0e1525] text-white">
    <nav class="flex items-center justify-between px-6 py-4 glass mb-4 w-full fixed z-40">
        <div class="flex items-center gap-2">
            <img src="/assets/img/logo.png" alt="Logo" class="h-8 rounded-full" />
            <span class="font-bold text-xl text-gold-400">Vendora</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="/wallet.html" class="glass px-4 py-1 rounded-full text-gold-400 border border-gold-400 font-bold">Wallet <span id="wallet-balance">₦0</span></a>
            <button onclick="handleLogout()" class="bg-red-600 text-white rounded px-4 py-1 font-bold">Logout</button>
        </div>
    </nav>
    <div class="h-20"></div>

    <main class="max-w-7xl mx-auto py-8 px-2">
        <h1 class="text-2xl md:text-4xl font-bold text-gold-400 mb-2">Marketplace</h1>
        <div class="flex flex-wrap items-center gap-2 mb-6">
            <input id="searchInput" type="text" placeholder="Search product..." class="rounded px-3 py-2 bg-black/40 border text-white w-full max-w-xs" />
            <select id="categorySelect" class="rounded px-2 py-2 bg-black/40 border text-white">
                <option value="">All Categories</option>
                <option>Verified Accounts</option>
                <option>WhatsApp Numbers</option>
                <option>Facebook</option>
                <option>TikTok</option>
                <option>Instagram</option>
                <option>Boosting Services</option>
                <option>Digital Products</option>
            </select>
        </div>
        <!-- Product Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-7">
            <!-- Populated by JS -->
        </div>
    </main>

    <script src="/assets/js/supabase.js"></script>
    <script src="/assets/js/marketplace.js"></script>
    <script>
        // Load wallet balance and products grid
        window.addEventListener('DOMContentLoaded', () => {
            // show balance if logged in
            window.VendoraSupabase.getUser().then(user => {
                if (!user) window.location.href = '/login.html';
            });
            loadMarketplace();
        });
    </script>
</body>
</html>
