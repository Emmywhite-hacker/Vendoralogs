<!DOCTYPE html>
<html lang="en" class="bg-white dark:bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora Wallet</title>
    <link rel="icon" href="favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="min-h-screen bg-gradient-to-tr from-black via-[#161f2b] to-gold-800 dark:from-black dark:to-[#0e1525] text-white">
    <nav class="flex items-center justify-between px-6 py-4 glass mb-4 w-full fixed z-40">
        <div class="flex items-center gap-2">
            <img src="/assets/img/logo.png" alt="Logo" class="h-8 rounded-full" />
            <span class="font-bold text-xl text-gold-400">Vendora</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="/marketplace.html" class="px-4 py-1 rounded-full glass text-gold-400 border border-gold-400 font-bold">Marketplace</a>
            <button onclick="handleLogout()" class="bg-red-600 text-white rounded px-4 py-1 font-bold">Logout</button>
        </div>
    </nav>
    <div class="h-20"></div>

    <main class="max-w-2xl mx-auto py-8 px-2">
        <h1 class="text-2xl md:text-4xl font-bold text-gold-400 mb-6">Your Wallet</h1>
        <div class="glass p-6 rounded-xl mb-10 shadow-lg text-center">
            <div class="text-lg mb-2">Wallet Balance:</div>
            <div id="wallet-balance" class="font-bold text-2xl text-gold-300 mb-3">₦0</div>
            <form id="depositForm" class="mt-2 flex flex-col gap-2 items-center" onsubmit="depositWallet(event)">
                <input type="number" name="amount" required min="100" step="1" placeholder="Amount (NGN)" class="p-2 rounded bg-black/30 border text-white w-40 text-center" />
                <button type="submit" class="neon-btn bg-gradient-to-r from-blue-400 to-gold-400 px-6 py-2 rounded-full font-bold text-black mt-2">Deposit via Kora Pay</button>
            </form>
        </div>
        <h2 class="font-bold text-xl mb-2">Transaction History</h2>
        <div class="bg-black/20 p-2 rounded-lg shadow">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-gold-300"><th>Date</th><th>Type</th><th>Amount</th><th>Status</th></tr>
                </thead>
                <tbody id="wallet-txs">
                </tbody>
            </table>
        </div>
    </main>
    <script src="/assets/js/supabase.js"></script>
    <script src="/assets/js/kora-pay.js"></script>
    <script src="/assets/js/wallet.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            window.VendoraSupabase.getUser().then(user => {
                if (!user) window.location.href = '/login.html';
                loadWallet();
            });
        });
    </script>
</body>
</html>
