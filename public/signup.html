<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Vendora Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-black via-blue-900 to-green-900">
    <div class="bg-black border border-green-500/50 p-8 rounded-xl w-full max-w-md shadow-2xl">
        <div class="mb-8 text-center">
            <img src="/assets/img/logo.png" class="mx-auto h-14 rounded-full mb-3" onerror="this.style.background='linear-gradient(135deg, #22c55e, #3b82f6)'">
            <h1 class="text-2xl font-bold text-green-400">Vendora Logs</h1>
            <div class="text-gray-400 text-sm mt-1">Create Your Account</div>
        </div>
        
        <form id="signupForm" class="flex flex-col gap-4" onsubmit="handleSignup(event)">
            <input required name="name" placeholder="Full Name" class="p-3 rounded bg-slate-900 border border-gray-700 text-white placeholder-gray-500" />
            <input required type="email" name="email" placeholder="Email Address" class="p-3 rounded bg-slate-900 border border-gray-700 text-white placeholder-gray-500" />
            <input required type="password" name="password" placeholder="Password (min 6 chars)" class="p-3 rounded bg-slate-900 border border-gray-700 text-white placeholder-gray-500" />
            
            <button class="mt-3 bg-gradient-to-r from-green-400 to-blue-500 px-5 py-3 rounded-full text-black font-bold hover:scale-105 transition">
                Create Account
            </button>
            
            <p id="auth-error" class="text-red-500 text-sm hidden"></p>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-400">
            Already have an account? <a href="/login.html" class="text-green-400 underline font-semibold">Login here</a>
        </div>
        
        <div class="mt-4 text-xs text-gray-500 text-center">
            By signing up, you agree to our <a href="/terms.html" class="underline">Terms of Service</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/assets/js/supabase.js"></script>
    <script src="/assets/js/auth.js"></script>
</body>
</html>
