<!DOCTYPE html>
<html lang="en" class="bg-white dark:bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora Market - Signup</title>
    <link rel="icon" href="favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-[#111] via-[#151f2b] to-gold-900 dark:from-black dark:to-[#16191e]">
    <div class="glass p-8 rounded-xl w-full max-w-md shadow-2xl">
        <div class="mb-8 text-center">
            <img src="/assets/img/logo.png" class="mx-auto h-12 rounded-full" />
            <h1 class="text-2xl font-bold mt-2 text-gold-400">Create account</h1>
            <div class="text-gray-400 text-sm">Join Vendora and start shopping digital products</div>
        </div>
        <form id="signupForm" class="flex flex-col gap-4" onsubmit="handleSignup(event)">
            <input required name="name" placeholder="Full name" class="p-3 rounded bg-slate-50 dark:bg-slate-900 border" />
            <input required type="email" name="email" placeholder="Email" class="p-3 rounded bg-slate-50 dark:bg-slate-900 border" />
            <input required type="password" name="password" placeholder="Password" class="p-3 rounded bg-slate-50 dark:bg-slate-900 border" />
            <button class="mt-2 neon-btn bg-gradient-to-r from-gold-400 to-blue-500 px-5 py-3 rounded-full text-black font-bold">Sign up</button>
            <p id="auth-error" class="text-red-500 text-xs"></p>
        </form>
        <div class="mt-6 text-center text-sm">
            Already have an account?
            <a href="/login.html" class="underline text-blue-500">Login</a>
        </div>
    </div>
    <script src="/assets/js/supabase.js"></script>
    <script src="/assets/js/auth.js"></script>
</body>
</html>
